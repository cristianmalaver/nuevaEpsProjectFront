<div class="dashboard">

  <div class="topbar">
    <h1>Lista de Solicitudes</h1>

    <div class="actions">
      <button class="btn-primary" (click)="nuevaSolicitud()">
        + Nueva Solicitud
      </button>

      <button class="btn-logout" (click)="logout()">
        Cerrar sesión
      </button>
    </div>
  </div>

  <div class="content">

    <div *ngIf="loading" class="loading">
      Cargando solicitudes...
    </div>

    <div *ngIf="errorMessage" class="error">
      {{ errorMessage }}
    </div>

    <table *ngIf="!loading && solicitudes.length > 0">

      <thead>
        <tr>
          <th>ID</th>
          <th>Nombre</th>
          <th>Medicamento</th>
          <th>Fecha</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let s of solicitudes">
          <td>{{ s.id }}</td>
          <td>{{ s.usuario }}</td>
          <td>{{ s.medicamento }}</td>
          <td>{{ s.fechaSolicitud }}</td>
        </tr>
      </tbody>

    </table>
<div class="pagination-container" *ngIf="totalPages > 0">

  <!-- Info -->
  <div class="info">
    Mostrando {{ solicitudes.length }} de {{ totalElements }} registros
  </div>

  <!-- Selector -->
  <div class="page-size">
    <label>Mostrar:</label>
    <select (change)="changePageSize($event)">
      <option value="2">2</option>
      <option value="5">5</option>
      <option value="10">10</option>
    </select>
  </div>

  <!-- Controles -->
  <div class="pagination">

    <button (click)="prevPage()" [disabled]="currentPage === 0">
      ◀
    </button>

    <button 
      *ngFor="let page of pageNumbers"
      (click)="changePage(page)"
      [class.active]="page === currentPage">
      {{ page + 1 }}
    </button>

    <button 
      (click)="nextPage()" 
      [disabled]="currentPage === totalPages - 1">
      ▶
    </button>

  </div>

</div>


    <div *ngIf="!loading && solicitudes.length === 0" class="empty">
      No hay solicitudes registradas.
    </div>

  </div>

</div>
