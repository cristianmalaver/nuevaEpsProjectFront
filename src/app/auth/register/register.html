<div class="auth-container">

  <div class="auth-card">

    <h2>Crear Cuenta</h2>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">

      <div class="form-group">
        <input type="text" placeholder="Username" formControlName="username">
      </div>

      <div class="form-group">
        <input type="text" placeholder="Nombre completo" formControlName="nombre">
      </div>

      <div class="form-group">
        <input type="email" placeholder="Correo electrónico" formControlName="email">
      </div>

      <div class="form-group">
        <input type="password" placeholder="Contraseña" formControlName="password">
      </div>

      <div class="form-group">
        <select formControlName="rol">
          <option value="USER">Usuario</option>
          <option value="ADMIN">Administrador</option>
        </select>
      </div>

      <button type="submit" [disabled]="form.invalid">
        Registrarse
      </button>

    </form>

    <p class="error" *ngIf="errorMessage">
      {{ errorMessage }}
    </p>

    <div class="link">
      ¿Ya tienes cuenta?
      <a routerLink="/login">Inicia sesión</a>
    </div>

  </div>

</div>
